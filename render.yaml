services:
  - type: web
    name: fx-assistant
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: pip install -r backend/requirements.txt && cd backend && gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120

    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////opt/render/project/src/backend/prod.db
