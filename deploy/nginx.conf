# /etc/nginx/sites-available/fx-assistant
server {
    listen 80;
    server_name fx.example.com;  # Change to your domain

    root /opt/fx-assistant/frontend;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Static assets with long cache
    location /css/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location /js/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Service worker and manifest - no cache
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache";
    }
    location = /manifest.json {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: serve index.html for all non-file, non-API routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to Gunicorn via Unix socket
    location /api/ {
        proxy_pass http://unix:/run/fx-assistant.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
